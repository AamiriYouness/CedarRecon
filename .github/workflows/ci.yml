name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  # Allows manually triggering benchmarks on any branch from GitHub UI
  # Use this when you want to run the cross-platform matrix without merging to main
  workflow_dispatch:
    inputs:
      filter:
        description: 'BenchmarkDotNet filter (e.g. *ModuloBenchmark* or * for all)'
        required: false
        default: '*ModuloBenchmark*'

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            src/**/bin/Release/
          retention-days: 1

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Run unit tests
        run: |
          dotnet test tests/CedarRecon.Tests.Unit \
            --configuration Release \
            --no-restore \
            --logger "trx;LogFileName=unit-results.trx" \
            --results-directory ./test-results/unit \
            --collect:"XPlat Code Coverage"

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: ./test-results/unit/

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: "**/coverage.cobertura.xml"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Run integration tests
        run: |
          dotnet test tests/CedarRecon.Tests.Integration \
            --configuration Release \
            --no-restore \
            --logger "trx;LogFileName=integration-results.trx" \
            --results-directory ./test-results/integration

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: ./test-results/integration/

  test-report:
    name: Publish Test Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
      - name: Download unit test results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: ./test-results/unit

      - name: Download integration test results
        uses: actions/download-artifact@v4
        with:
          name: integration-test-results
          path: ./test-results/integration

      - name: Publish test report
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: "test-results/**/*.trx"
          reporter: dotnet-trx
          fail-on-error: true

  # ── Benchmark (main branch, automatic) ───────────────────────────────────────
  # Runs after tests pass on main — tracks regression on every merge.
  # Results uploaded as artifacts and summarised in GitHub Actions UI.
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Run benchmarks
        run: |
          dotnet run \
            --project tests/CedarRecon.Tests.Performance \
            --configuration Release \
            -- --filter "${{ github.event.inputs.filter || '*' }}" \
               --exporters json github \
               --artifacts BenchmarkDotNet.Artifacts

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-ubuntu-net10
          path: BenchmarkDotNet.Artifacts/
          retention-days: 30

      - name: Write benchmark summary
        run: |
          python3 .github/scripts/summarise_benchmarks.py \
            --artifacts-dir BenchmarkDotNet.Artifacts \
            --output docs/benchmark-results.md
          cat docs/benchmark-results.md >> $GITHUB_STEP_SUMMARY

  # ── Benchmark matrix (manual trigger only) ────────────────────────────────────
  # Run from GitHub UI → Actions → CI → Run workflow.
  # Produces a cross-platform table: Windows/Linux/macOS × .NET 8/9/10.
  # Use this to investigate a resolver change before merging — not automatic.
  benchmark-matrix:
    name: Benchmark (${{ matrix.os }} · .NET ${{ matrix.dotnet }})
    runs-on: ${{ matrix.os }}
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'workflow_dispatch'

    strategy:
      # Never cancel other matrix jobs if one fails — we want all 9 data points
      fail-fast: false
      matrix:
        os:     [ubuntu-latest, windows-latest, macos-latest]
        dotnet: ['8.0', '9.0', '10.0']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ matrix.dotnet }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ matrix.dotnet }}-

      - name: Restore
        run: dotnet restore

      - name: Run benchmarks
        run: |
          dotnet run \
            --project tests/CedarRecon.Tests.Performance \
            --configuration Release \
            -- --filter "${{ github.event.inputs.filter || '*ModuloBenchmark*' }}" \
               --exporters json github \
               --artifacts BenchmarkDotNet.Artifacts

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.os }}-net${{ matrix.dotnet }}
          path: BenchmarkDotNet.Artifacts/
          retention-days: 90

  
  benchmark-matrix-summary:
    name: Benchmark Matrix Summary
    runs-on: ubuntu-latest
    needs: benchmark-matrix
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all matrix artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: benchmark-results-*

      - name: Generate consolidated summary
        run: |
          python3 .github/scripts/summarise_benchmarks.py \
            --artifacts-dir all-artifacts \
            --output docs/benchmark-results.md
          cat docs/benchmark-results.md >> $GITHUB_STEP_SUMMARY

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: benchmark-matrix-results
          path: docs/benchmark-results.md